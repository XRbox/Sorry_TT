<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Atom - Memories</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300&display=swap');

        body {
            margin: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Kanit', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        h2 {
            margin-bottom: 30px;
            color: #ff3385;
            text-shadow: 0 0 10px #ff3385;
            font-size: 1.8rem;
        }

        /* จัดระเบียบรูปภาพเป็น Grid รูปหัวใจ */
        .heart-grid {
            display: grid;
            grid-template-columns: repeat(7, 50px); /* 7 คอลัมน์ */
            grid-template-rows: repeat(6, 50px);    /* 6 แถว */
            gap: 10px;
            position: relative;
        }

        /* ปรับขนาดรูปใน Grid */
        .heart-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #ff3385;
            opacity: 0; /* เริ่มต้นซ่อนไว้ */
            transform: scale(0);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* คลาสที่จะใส่ด้วย JS เพื่อให้รูปเด้งขึ้นมา */
        .heart-grid img.show {
            opacity: 1;
            transform: scale(1);
        }

        /* กำหนดตำแหน่งแต่ละรูปให้เป็นทรงหัวใจ */
        /* (แถวที่ 1) */
        .img-1 { grid-column: 2; grid-row: 1; }
        .img-2 { grid-column: 3; grid-row: 1; }
        .img-3 { grid-column: 5; grid-row: 1; }
        .img-4 { grid-column: 6; grid-row: 1; }
        /* (แถวที่ 2) */
        .img-5 { grid-column: 1; grid-row: 2; }
        .img-6 { grid-column: 2; grid-row: 2; }
        .img-7 { grid-column: 3; grid-row: 2; }
        .img-8 { grid-column: 4; grid-row: 2; }
        .img-9 { grid-column: 5; grid-row: 2; }
        .img-10 { grid-column: 6; grid-row: 2; }
        .img-11 { grid-column: 7; grid-row: 2; }
        /* (แถวที่ 3) */
        .img-12 { grid-column: 1; grid-row: 3; }
        .img-13 { grid-column: 4; grid-row: 3; }
        .img-14 { grid-column: 7; grid-row: 3; }
        /* (แถวที่ 4) */
        .img-15 { grid-column: 2; grid-row: 4; }
        .img-16 { grid-column: 6; grid-row: 4; }
        /* (แถวที่ 5) */
        .img-17 { grid-column: 3; grid-row: 5; }
        .img-18 { grid-column: 5; grid-row: 5; }
        /* (แถวที่ 6 - ปลายหัวใจ) */
        .img-19 { grid-column: 4; grid-row: 6; }

        @media (min-width: 600px) {
            .heart-grid {
                grid-template-columns: repeat(7, 80px);
                grid-template-rows: repeat(6, 80px);
            }
        }
        #starfield {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <h2>อย่าทิ้งเค้าเลย ;-;</h2>

    <div class="heart-grid" id="gallery">
        <img src="img/page3/1_Anniver.jpg" class="img-1">
        <img src="img/page3/chapter2.jpg" class="img-2">
        <img src="img/page3/allAboutAtom.jpg" class="img-3">
        <img src="img/page3/AllAboutMe.png" class="img-4">
        <img src="img/page3/TaohuAtom.jpg" class="img-5">
        <img src="img/page3/RoV50star.jpg" class="img-6">
        <img src="img/page3/CountDown.jpg" class="img-7">
        <img src="img/page3/Teenoi.jpg" class="img-8">
        <img src="img/page3/Roblox.jpg" class="img-9">
        <img src="img/page3/glassedBroken.jpg" class="img-10">
        <img src="img/page3/githubIwillfix.jpg" class="img-11">
        <img src="img/page3/imSick.jpg" class="img-12">
        <img src="img/page3/PleaseMoney.jpg" class="img-13">
        <img src="img/page3/flowersecond.jpg" class="img-14">
        <img src="img/page3/Dettol.jpg" class="img-15">
        <img src="img/page3/datdarunee.webp" class="img-16">
        <img src="img/page3/flowerLinehack.jpg" class="img-17">
        <img src="img/page3/flower.jpg" class="img-18">
        <img src="img/page3/Valentine.jpg" class="img-19">
    </div>

    <script>
        // --- 1. ระบบดาวระยิบระยับ (Starfield) ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(star => {
                ctx.globalAlpha = Math.abs(Math.sin(star.opacity));
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.opacity += star.speed;
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawStars();
        window.onload = () => {
        const images = document.querySelectorAll('.heart-grid img');
        images.forEach((img, index) => {
            setTimeout(() => {
                img.classList.add('show');
            }, index * 150); // รูปจะเด้งขึ้นมาทีละ 0.15 วินาที
        });
    };
    </script>
</body>
</html>
