<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Atom - Memories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap');

        body {
            margin: 0;
            background-color: black;
            color: white;
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* พื้นหลังดาวระยิบระยับ */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* กล่องข้อความ */
        .message-box {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            min-height: 45px;
            position: relative;
            box-shadow: 0 5px 15px rgba(255, 51, 133, 0.3);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-box::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }

        /* Swiper Cards */
        .swiper {
            width: 260px;
            height: 350px;
        }

        .swiper-slide {
            border-radius: 18px;
            border: 5px solid white;
            background-color: #333;
            overflow: hidden;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ตัวนับถอยหลังจางๆ มุมจอ */
        #redirect-timer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.3);
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="redirect-timer">กำลังจะไปหน้าถัดไปใน <span id="seconds">5</span>...</div>

    <div class="container">
        <div class="message-box">
            <div id="typed-output"></div>
        </div>

        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="img/page2/zodasorry.png"></div>
                <div class="swiper-slide"><img src="img/page2/love.webp"></div>
                <div class="swiper-slide"><img src="img/page2/flower4Atom.jpg"></div>
                <div class="swiper-slide"><img src="img/page2/salmon.jpg"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

    <script>
        // --- 1. ระบบดาวระยิบระยับ (Starfield) ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(star => {
                ctx.globalAlpha = Math.abs(Math.sin(star.opacity));
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.opacity += star.speed;
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawStars();

        // --- 2. ระบบข้อความ (Typed.js) ---
        const messages = [
            "เค้าขอโทษ แงงงงงงงงงงงงง",
            "เค้ารักเธอนะ ;-; เค้ารักอะตอมมม",
            "ดอกไม้เค้าให้อะตอมมมม",
            "แซลม่อนดองด้วยย ให้อะตอมกินนน"
        ];

        let typedInstance;
        function startTyping(text) {
            if (typedInstance) typedInstance.destroy();
            typedInstance = new Typed('#typed-output', {
                strings: [text],
                typeSpeed: 50,
                showCursor: false
            });
        }

        // --- 3. ระบบนับถอยหลัง (Timer) ---
        const timerDiv = document.getElementById('redirect-timer');
        const secondsSpan = document.getElementById('seconds');
        let countdownValue = 5;
        let countdownTimer = null;

        function startFinalCountdown() {
            timerDiv.style.display = 'block';
            countdownValue = 5;
            secondsSpan.innerText = countdownValue;
            if (countdownTimer) clearInterval(countdownTimer);
            
            countdownTimer = setInterval(() => {
                countdownValue--;
                secondsSpan.innerText = countdownValue;
                if (countdownValue <= 0) {
                    clearInterval(countdownTimer);
                    window.location.href = "page3.html"; // ไปหน้าถัดไป
                }
            }, 1000);
        }

        function resetFinalCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            timerDiv.style.display = 'none';
        }

        // --- 4. ระบบสไลด์ (Swiper) ---
        var swiper = new Swiper(".mySwiper", {
            effect: "cards",
            grabCursor: true,
            on: {
                init: function () {
                    startTyping(messages[0]);
                },
                slideChange: function () {
                    startTyping(messages[this.activeIndex]);
                    // ถ้าเลื่อนถึงรูปสุดท้าย (Index เริ่มที่ 0 ดังนั้นรูปที่ 4 คือ index 3)
                    if (this.activeIndex === messages.length - 1) {
                        startFinalCountdown();
                    } else {
                        resetFinalCountdown();
                    }
                }
            }
        });
    </script>
</body>
</html>
